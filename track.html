<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFJMQ5M5JL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GFJMQ5M5JL');
  </script>
  <title>Track your order — TopUpWorld</title>
  <meta name="description" content="Track your TopUpWorld order status using your order ID." />
  <link rel="icon" type="image/jpeg" href="/assets/brand/brand.jpeg" />
  <meta name="theme-color" content="#ff6a00" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="topbar">
    <div class="container topbar-inner">
      <span class="topbar-left">Track your order</span>
      <div class="topbar-right"><a href="/">Back to store</a></div>
    </div>
  </div>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="34" height="34" fill="none">
            <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff8a3d"/><stop offset="1" stop-color="#ff5a00"/></linearGradient></defs>
            <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#lg)"/>
            <path d="M22.5 8 12 22.5h6.4L16 32l11.2-15.4H20L22.5 8z" fill="#fff"/></svg>
        </span>
        <span class="brand-name">TopUp<span>World</span></span>
      </a>
      <div class="header-actions" style="margin-left:auto">
        <a class="cart-link" href="/cart" aria-label="Cart">🛒<span class="cart-count" id="cartCount">0</span></a>
      </div>
    </div>
  </header>

  <main class="container page-wrap">
    <div class="crumbs"><a href="/">Home</a><span class="sep">›</span><span>Track order</span></div>
    <h1 class="page-title">Track your order</h1>
    <p class="muted" style="margin-bottom:1.4rem">Enter the order ID we showed you after payment (starts with <strong>TUW</strong>) to see its status.</p>

    <div class="panel" style="max-width:520px">
      <div class="field">
        <label for="trackId">Order ID</label>
        <input id="trackId" type="text" placeholder="e.g. TUWLB12AB34" autocomplete="off"
          style="width:100%;padding:.85rem .95rem;border:1px solid var(--line);border-radius:10px;background:#2a2a2a;color:#fff;font-family:inherit;font-size:1rem;letter-spacing:.5px" />
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="trackBtn" type="button" style="margin-top:1rem">Track order</button>
      <p class="field-hint">Can't find your order ID? <a href="/contact" style="color:var(--orange)">Contact support</a>.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom" style="border:none">© <span id="year"></span> TopUpWorld. All rights reserved.</div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (function () {
      function go() {
        var id = (document.getElementById('trackId').value || '').trim();
        if (!id) { window.toast && window.toast('⚠️ Enter your order ID.', 'err'); return; }
        location.href = '/return?order_id=' + encodeURIComponent(id);
      }
      document.getElementById('trackBtn').addEventListener('click', go);
      document.getElementById('trackId').addEventListener('keydown', function (e) { if (e.key === 'Enter') go(); });
    })();
  </script>
</body>
</html>
