<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFJMQ5M5JL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GFJMQ5M5JL');
  </script>
  <title>Admin — TopUpWorld</title>
  <link rel="icon" type="image/jpeg" href="/assets/brand/brand.jpeg" />
  <meta name="theme-color" content="#ff6a00" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- Login gate -->
  <div class="admin-login" id="adminLogin">
    <div class="admin-login-card">
      <div class="login-head">
        <span class="brand-mark"><svg viewBox="0 0 40 40" width="40" height="40" fill="none">
          <defs><linearGradient id="lg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ff8a3d"/><stop offset="1" stop-color="#ff5a00"/></linearGradient></defs>
          <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#lg)"/>
          <path d="M22.5 8 12 22.5h6.4L16 32l11.2-15.4H20L22.5 8z" fill="#fff"/></svg></span>
        <h2>Admin Panel</h2>
        <p>Enter your admin password to continue.</p>
      </div>
      <div class="field"><label for="adminPass">Password</label>
        <input id="adminPass" type="password" placeholder="Admin password" /></div>
      <button class="btn btn-primary btn-block btn-lg" id="adminLoginBtn" style="margin-top:.8rem">Sign in</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="admin-shell" id="adminShell" style="display:none">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <span class="brand-mark"><svg viewBox="0 0 40 40" width="30" height="30" fill="none">
          <defs><linearGradient id="lg2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
            <stop stop-color="#ff8a3d"/><stop offset="1" stop-color="#ff5a00"/></linearGradient></defs>
          <rect x="1" y="1" width="38" height="38" rx="11" fill="url(#lg2)"/>
          <path d="M22.5 8 12 22.5h6.4L16 32l11.2-15.4H20L22.5 8z" fill="#fff"/></svg></span>
        <span class="brand-name">TopUp<span>World</span></span>
      </div>
      <nav class="admin-nav">
        <button class="admin-tab is-active" data-view="orders">🧾 Orders</button>
        <button class="admin-tab" data-view="prices">💰 Prices</button>
        <button class="admin-tab" data-view="logos">🖼️ Game Logos</button>
        <button class="admin-tab" data-view="hero">🎞️ Hero Banners</button>
        <button class="admin-tab" data-view="brand">🏷️ Site Logo</button>
        <button class="admin-tab" data-view="socials">🔗 Social Links</button>
      </nav>
      <div class="admin-sidebar-foot">
        <a href="/" target="_blank" class="admin-link">↗ View site</a>
        <button class="admin-logout" id="adminLogout">Sign out</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 id="adminViewTitle">Prices</h1>
        <span class="admin-saved" id="adminSaved"></span>
      </div>
      <div id="adminView"></div>
    </main>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
